name: Competition

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"   # 06:00 UTC (~07:00 Paris)

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          pip install requests pyyaml beautifulsoup4 feedparser

      - name: Newsletter_Charles
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python Newsletter_Charles.py

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: newsletter-output
          path: output/
